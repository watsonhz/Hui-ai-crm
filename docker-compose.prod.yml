version: '3.8'
services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: ai_crm
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: ${DB_PASS:-crm_pass}
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d ai_crm"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env.prod
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      retries: 3

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [backend]
    restart: always

  nginx:
    image: nginx:alpine
    ports: ["80:80"]
    volumes: [./nginx.conf:/etc/nginx/conf.d/default.conf:ro]
    depends_on: [frontend, backend]
    restart: always

volumes:
  pgdata:
