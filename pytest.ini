[pytest]
# === 测试路径 ===
testpaths = tests

# === 测试发现规则 ===
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# === 自定义标记 ===
markers =
    unit: 单元测试 — 单个函数/类，无外部依赖
    integration: 集成测试 — 数据库/Redis/外部服务
    api: API 端点测试 — HTTP 请求/响应
    performance: 性能测试 — 并发/负载
    security: 安全验证测试 — SQL注入/XSS/权限
    slow: 慢速测试，默认跳过（CI 中按需启用）
    smoke: 冒烟测试，部署后快速验证核心功能

# === 覆盖率配置 ===
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=backend/app
    --cov-report=term-missing
    --cov-report=html:tests/reports/coverage
    --cov-report=xml:tests/reports/coverage.xml
    --cov-fail-under=0
    -p no:warnings

# === 异步支持 ===
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# === 超时设置 ===
timeout = 300
timeout_method = thread

# === 并行执行 ===
# 使用: pytest -n auto
# 本机开发时默认不并发，CI 中加 -n auto

# === 日志 ===
log_cli = false
log_cli_level = INFO
log_file = tests/reports/test-run.log
log_file_level = DEBUG

# === 忽略路径 ===
norecursedirs = .git .venv venv node_modules __pycache__ .pytest_cache

# === 最小 Python 版本 ===
minversion = 8.0
