[pytest]
# ── Core Settings ──
minversion = 8.3
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers --strict-config

# ── Markers ──
markers =
    unit: Unit tests (no DB, no network)
    integration: Integration tests (DB, fixtures)
    api: API endpoint tests (HTTP, FastAPI TestClient)
    performance: Performance and load tests
    security: Security verification tests
    slow: Tests that take >1s to complete
    smoke: Quick smoke tests for CI pre-check

# ── Coverage ──
; Run with: pytest --cov=app --cov-report=html:tests/reports/coverage

# ── Timeout ──
timeout = 30
timeout_method = thread

# ── Async ──
asyncio_mode = strict

# ── Warnings ──
filterwarnings =
    ignore::DeprecationWarning:sqlalchemy.*
    ignore::DeprecationWarning:passlib.*
